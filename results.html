<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Results – Doodle Poll</title>
  <style>
    :root {
      --bg: #f0f4f8;
      --card: #ffffff;
      --primary: #3b82f6;
      --yes: #22c55e;
      --yes-light: #dcfce7;
      --yes-dark: #16a34a;
      --maybe: #f59e0b;
      --maybe-light: #fef3c7;
      --maybe-dark: #d97706;
      --no: #ef4444;
      --no-light: #fee2e2;
      --no-dark: #dc2626;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 10px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 48px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 32px;
      margin-bottom: 20px;
    }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
    h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: 16px; }
    .description { color: var(--muted); font-size: 0.95rem; margin-bottom: 6px; }
    .organizer { font-size: 0.85rem; color: var(--muted); }
    .organizer strong { color: var(--text); }

    /* Summary chips */
    .best-date {
      background: var(--yes-light);
      border: 1.5px solid var(--yes);
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .best-date .label { font-weight: 600; color: var(--yes-dark); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .best-date .slot { font-weight: 700; font-size: 1rem; }
    .best-date .count { font-size: 0.85rem; color: var(--muted); margin-left: auto; }

    /* Grid table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 400px; }
    thead tr th {
      padding: 10px 14px;
      text-align: left;
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 2px solid var(--border);
    }
    thead tr th:first-child { min-width: 180px; }
    tbody tr td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #f8fafc; }

    .cell-yes   { background: var(--yes-light); color: var(--yes-dark); font-weight: 600; border-radius: 6px; text-align: center; }
    .cell-maybe { background: var(--maybe-light); color: var(--maybe-dark); font-weight: 600; border-radius: 6px; text-align: center; }
    .cell-no    { background: var(--no-light); color: var(--no-dark); border-radius: 6px; text-align: center; }
    .cell-name  { font-weight: 600; }
    .cell-date  { }

    /* Summary row */
    .summary-row td { background: #f8fafc; font-weight: 700; }
    .bar {
      display: flex;
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 4px;
      gap: 1px;
    }
    .bar-yes   { background: var(--yes); }
    .bar-maybe { background: var(--maybe); }
    .bar-no    { background: var(--no); }
    .bar-empty { background: var(--border); width: 100%; }

    .score { font-size: 0.8rem; color: var(--muted); }
    .score .yes-count { color: var(--yes-dark); font-weight: 700; }

    /* States */
    #state-loading, #state-error, #state-empty { text-align: center; padding: 48px 24px; }
    #state-error { color: var(--no-dark); }
    .spinner {
      display: inline-block;
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }

    .nav-links { text-align: center; margin-top: 16px; }
    .nav-links a {
      color: var(--primary);
      text-decoration: none;
      font-size: 0.9rem;
      margin: 0 10px;
    }
    .nav-links a:hover { text-decoration: underline; }
    .btn-link {
      display: inline-block;
      padding: 10px 22px;
      background: var(--primary);
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      margin: 6px;
      font-size: 0.9rem;
    }
    .refresh-btn {
      border: none;
      background: transparent;
      color: var(--primary);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0;
    }
    .refresh-btn:hover { text-decoration: underline; }
    .meta { font-size: 0.8rem; color: var(--muted); margin-top: 8px; }
  </style>
</head>
<body>
<div class="container">

  <div id="state-loading" class="card">
    <div class="spinner"></div>
    <p style="color:var(--muted)">Loading results…</p>
  </div>

  <div id="state-error" class="card hidden">
    <p style="font-size:2rem;margin-bottom:12px">⚠️</p>
    <p id="error-msg"></p>
  </div>

  <div id="state-results" class="hidden">
    <div class="card">
      <h1 id="poll-title"></h1>
      <p class="description" id="poll-desc"></p>
      <p class="organizer">Organized by <strong id="poll-organizer"></strong></p>
    </div>

    <!-- Best dates -->
    <div class="card" id="best-card">
      <h2>Best Options</h2>
      <div id="best-list"></div>
    </div>

    <!-- Full grid -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h2 style="margin:0">All Responses</h2>
        <button class="refresh-btn" onclick="init()">↻ Refresh</button>
      </div>
      <div id="state-empty" class="hidden">
        <p style="color:var(--muted)">No responses yet.</p>
        <a href="index.html" class="btn-link" style="margin-top:16px">Be the first to vote</a>
      </div>
      <div class="table-wrap">
        <table id="grid-table">
          <thead id="grid-head"></thead>
          <tbody id="grid-body"></tbody>
        </table>
      </div>
      <p class="meta" id="response-meta"></p>
    </div>

    <div class="nav-links">
      <a href="index.html">← Back to Vote</a>
      <a href="setup.html">Setup / Edit Poll</a>
    </div>
  </div>

</div>
<script>
  let config = null;

  function show(id) {
    ['state-loading','state-error','state-results'].forEach(s => {
      document.getElementById(s).classList.toggle('hidden', s !== id);
    });
  }
  function showError(msg) {
    document.getElementById('error-msg').textContent = msg;
    show('state-error');
  }

  function parseConfig(text) {
    const cfg = { poll: {}, github: {}, slots: [] };
    let section = null;
    for (let raw of text.split('\n')) {
      const line = raw.trim();
      if (!line || line.startsWith('#')) continue;
      const sec = line.match(/^\[(\w+)\]$/);
      if (sec) { section = sec[1]; continue; }
      if (section === 'poll' || section === 'github') {
        const eq = line.indexOf('=');
        if (eq > 0) cfg[section][line.slice(0,eq).trim()] = line.slice(eq+1).trim();
      } else if (section === 'slots') {
        if (line) cfg.slots.push(line);
      }
    }
    return cfg;
  }

  function formatSlot(slot) {
    const parts = slot.split(' ');
    const [y, m, d] = parts[0].split('-').map(Number);
    const date = new Date(y, m - 1, d);
    const dateStr = date.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
    if (parts[1]) {
      const [h, min] = parts[1].split(':').map(Number);
      const t = new Date(y, m - 1, d, h, min);
      return dateStr + ' ' + t.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
    }
    return dateStr + ' (all day)';
  }

  function parseResponse(text) {
    const result = { name: '', submitted: '', votes: {} };
    for (const line of text.split('\n')) {
      const trimmed = line.trim();
      if (!trimmed) continue;
      if (trimmed.startsWith('Name:')) {
        result.name = trimmed.slice(5).trim();
      } else if (trimmed.startsWith('Submitted:')) {
        result.submitted = trimmed.slice(10).trim();
      } else {
        // "2026-04-15 09:00: yes" or "2026-04-15: no"
        const colon = trimmed.lastIndexOf(':');
        if (colon > 0) {
          const slot = trimmed.slice(0, colon).trim();
          const val  = trimmed.slice(colon + 1).trim().toLowerCase();
          result.votes[slot] = val;
        }
      }
    }
    return result;
  }

  async function fetchResponses() {
    const { owner, repo, branch, token } = config.github;
    if (!owner || !repo || owner.startsWith('YOUR')) return [];

    const headers = token && !token.startsWith('YOUR') ? { 'Authorization': `token ${token}` } : {};
    const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/responses?ref=${branch || 'main'}`, { headers });
    if (res.status === 404) return []; // no responses yet
    if (!res.ok) throw new Error(`GitHub API error ${res.status}: could not list responses`);
    const files = await res.json();
    const txtFiles = files.filter(f => f.name.endsWith('.txt') && f.name !== '.gitkeep');

    const responses = await Promise.all(txtFiles.map(async f => {
      const r = await fetch(f.download_url);
      const text = await r.text();
      return parseResponse(text);
    }));
    return responses.filter(r => r.name);
  }

  function computeScores(responses, slots) {
    return slots.map(slot => {
      let yes = 0, maybe = 0, no = 0;
      responses.forEach(r => {
        const v = r.votes[slot] || 'no';
        if (v === 'yes') yes++;
        else if (v === 'maybe') maybe++;
        else no++;
      });
      return { slot, yes, maybe, no, total: responses.length };
    });
  }

  function renderBest(scores) {
    const sorted = [...scores].sort((a, b) => {
      const scoreA = a.yes * 2 + a.maybe;
      const scoreB = b.yes * 2 + b.maybe;
      return scoreB - scoreA;
    });
    const top = sorted.slice(0, 3);
    const el = document.getElementById('best-list');
    if (!top.length || !top[0].total) {
      el.innerHTML = '<p style="color:var(--muted);font-size:0.9rem">No responses yet.</p>';
      return;
    }
    el.innerHTML = top.map((s, i) => `
      <div class="best-date">
        <span style="font-size:1.2rem">${i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉'}</span>
        <div>
          <div class="label">${i === 0 ? 'Best option' : 'Option ' + (i+1)}</div>
          <div class="slot">${formatSlot(s.slot)}</div>
        </div>
        <div class="count">
          <span style="color:var(--yes-dark);font-weight:700">${s.yes}</span> yes
          ${s.maybe ? `, <span style="color:var(--maybe-dark);font-weight:700">${s.maybe}</span> maybe` : ''}
        </div>
      </div>`).join('');
  }

  function renderGrid(responses, slots, scores) {
    const emptyEl = document.getElementById('state-empty');
    const tableEl = document.getElementById('grid-table');

    if (!responses.length) {
      emptyEl.classList.remove('hidden');
      tableEl.classList.add('hidden');
      return;
    }
    emptyEl.classList.add('hidden');
    tableEl.classList.remove('hidden');

    // Head: "Name" + one column per respondent
    const head = document.getElementById('grid-head');
    head.innerHTML = `<tr>
      <th>Time Slot</th>
      ${responses.map(r => `<th>${escHtml(r.name)}</th>`).join('')}
      <th>Summary</th>
    </tr>`;

    // Body: one row per slot
    const body = document.getElementById('grid-body');
    body.innerHTML = scores.map(sc => {
      const cells = responses.map(r => {
        const v = r.votes[sc.slot] || 'no';
        const cls = v === 'yes' ? 'cell-yes' : v === 'maybe' ? 'cell-maybe' : 'cell-no';
        const label = v === 'yes' ? '✓' : v === 'maybe' ? '~' : '✗';
        return `<td class="${cls}">${label}</td>`;
      }).join('');

      const total = sc.total || 1;
      const barYes   = Math.round((sc.yes / total) * 100);
      const barMaybe = Math.round((sc.maybe / total) * 100);
      const barNo    = 100 - barYes - barMaybe;

      return `<tr>
        <td class="cell-date">${escHtml(formatSlot(sc.slot))}</td>
        ${cells}
        <td>
          <div class="score"><span class="yes-count">${sc.yes}</span>/${total} yes${sc.maybe ? `, ${sc.maybe} maybe` : ''}</div>
          <div class="bar">
            ${barYes > 0   ? `<div class="bar-yes"   style="width:${barYes}%"></div>` : ''}
            ${barMaybe > 0 ? `<div class="bar-maybe" style="width:${barMaybe}%"></div>` : ''}
            ${barNo > 0    ? `<div class="bar-no"    style="width:${barNo}%"></div>` : ''}
          </div>
        </td>
      </tr>`;
    }).join('');

    document.getElementById('response-meta').textContent =
      `${responses.length} response${responses.length !== 1 ? 's' : ''} · Last updated: ${new Date().toLocaleTimeString()}`;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function init() {
    show('state-loading');
    try {
      const res = await fetch('config.txt?_=' + Date.now());
      if (!res.ok) throw new Error('config.txt not found.');
      config = parseConfig(await res.text());

      document.getElementById('poll-title').textContent = config.poll.title || 'Poll Results';
      document.getElementById('poll-desc').textContent  = config.poll.description || '';
      document.getElementById('poll-organizer').textContent = config.poll.organizer || 'Unknown';
      document.title = (config.poll.title || 'Poll') + ' – Results';

      const responses = await fetchResponses();
      const scores    = computeScores(responses, config.slots);

      renderBest(scores);
      renderGrid(responses, config.slots, scores);
      show('state-results');
    } catch (err) {
      showError(err.message);
    }
  }

  init();
</script>
</body>
</html>
